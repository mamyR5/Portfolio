<!-- projects.html -->
<section class="projects-section">
  
  <header class="section-intro">
    <h2>Mes Réalisations</h2>
    <p>{{ introSentence }}</p>
  </header>

  <div class="projects-grid">
    
    @for(project of projectsList; track project.id) {
      <!-- 1. La carte redevient un élément passif (on retire le click et le cursor:pointer) -->
      <article class="project-card">
        
        <!-- HAUT DE CARTE -->
        <div class="card-cover" [style.background-image]="'url(' + project.coverImage + ')'">
          <div class="cover-overlay">
            
            <div class="cover-info">
              <h3>{{ project.title }}</h3>
              <p>{{ project.subtitle }}</p>
            </div>
            
            <!-- 2. C'est désormais UNIQUEMENT ce bouton qui déclenche l'ouverture au clic -->
            <button class="btn-action" (click)="openDetails(project)" aria-label="Voir les détails">
              Details
            </button>
            
          </div>
        </div>

        <!-- BAS DE CARTE -->
        <div class="card-details">
          <div class="details-left">
            <span class="period-badge">{{ project.period }}</span>
            <p class="project-desc">{{ project.description }}</p>
          </div>
        </div>

      </article>
    }

  </div>

  <!-- LA MODALE (Inchangée et toujours aussi performante) -->
  @if (selectedProject) {
    <app-project-detail 
      [project]="selectedProject" 
      (close)="closeDetails()">
    </app-project-detail>
  }

</section>
